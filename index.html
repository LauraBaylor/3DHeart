<!DOCTYPE html>
<html>
<head>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: #f5f5f5;
    }

    .Hotspot {
      border: none;
      background: transparent;
      overflow: visible;
      cursor: pointer;
    }

    .HotspotAnnotation {
      width: 40px;
      height: 40px;

      border-radius: 50%;

      background: #FFD700;
      border: 3px solid white;

      color: black;
      font-weight: bold;
      font-size: 18px;

      display: flex;
      align-items: center;
      justify-content: center;

      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
  </style>
</head>

<body>

<model-viewer
    src="Heart.glb"
    poster="poster.webp"
    camera-controls
    autoplay
    shadow-intensity="1"
    camera-orbit="-5.137deg 76.19deg 0.4007m"
    field-of-view="30deg">

    <button
      class="Hotspot"
      slot="hotspot-2"
      data-surface="0 0 17326 17325 17327 64.340 -1234.752 1171.412"
      onclick="sendToStoryline('Aorta')">

        <div class="HotspotAnnotation">1</div>

    </button>

</model-viewer>

<script>
function sendToStoryline(partName) {

  console.log("Hotspot clicked:", partName);

  window.parent.postMessage(
    {
      type: "heartHotspotClicked",
      part: partName
    },
    "*"
  );

}
</script>

</body>
</html>
