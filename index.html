<!DOCTYPE html>
<html>
<head>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>

<body>
  <model-viewer
  src="Heart.glb"
  poster="poster.webp"
  camera-controls
  auto-rotate
  autoplay
  shadow-intensity="1"
  style="width:100%; height:100vh;">
  
  <button
  class="hotspot"
  slot="hotspot-test"
  data-position="0 1 0"
  data-normal="0 1 0"
  onclick="sendToStoryline('Aorta')">
  1
</button>
</model-viewer>
</body>

</html>
