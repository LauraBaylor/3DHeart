<!DOCTYPE html>
<html>
<head>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: #ffffff;
    }

    .hotspot {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 3px solid white;
      background: gold;
      color: black;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }
  </style>
</head>

<body>

<model-viewer
  src="Heart.glb"
  poster="poster.webp"
  camera-controls
  autoplay
  shadow-intensity="1"
  style="width:100%; height:100vh;">

  <button
    class="hotspot"
    slot="hotspot-1"
    data-position="0.571m -0.481m 0.403m"
    data-normal="0m 1m 0m"
    onclick="sendToStoryline('Aorta')">
    1
  </button>

</model-viewer>

<script>
  function sendToStoryline(partName) {
    window.parent.postMessage(
      {
        type: "heartHotspotClicked",
        part: partName
      },
      "*"
    );
  }
</script>

</body>
</html>
